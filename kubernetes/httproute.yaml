apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pigen
spec:
  parentRefs:
    # Generic defaults. The deploy overrides name/sectionName (and the hostname
    # below) from the GitOps Application's kustomize.patches — see README.
    - name: gateway
      sectionName: https
  hostnames:
    - pigen.example.com
  rules:
    - backendRefs:
        - {name: pigen, port: 8080}
